# Serves the built SPA (used inside the `web` container)
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WASM crypto module must be served with the right MIME type
    types {
        application/wasm wasm;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
